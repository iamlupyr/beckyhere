<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f476ee">
  <title>Becky</title>
  <style>
    :root {
      --pink-top: #f58eea;
      --pink-mid: #f047ef;
      --pink-bottom: #d819e5;
      --ink: #661050;
      --white: #fff9ff;
      --glass: rgba(255,255,255,.72);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: white;
      background: #eb53ed;
    }

    body {
      min-height: 100svh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 10%, rgba(255,255,255,.28), transparent 28%),
        radial-gradient(circle at 84% 34%, rgba(255,196,247,.32), transparent 24%),
        linear-gradient(180deg, var(--pink-top) 0%, var(--pink-mid) 60%, var(--pink-bottom) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 100% 4px;
      mix-blend-mode: soft-light;
      opacity: .45;
    }

    .flowers {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .flower {
      --x: 50vw;
      --size: 24px;
      position: absolute;
      left: var(--x);
      bottom: -64px;
      width: var(--size);
      height: var(--size);
      display: grid;
      place-items: center;
      font-size: var(--size);
      filter: drop-shadow(0 4px 7px rgba(164, 8, 135, .28));
      opacity: 0;
      animation: float-up var(--time, 11s) linear infinite;
      animation-delay: var(--delay, 0s);
    }

    @keyframes float-up {
      0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(.7); opacity: 0; }
      10% { opacity: .7; }
      55% { transform: translate3d(var(--drift, 22px), -55vh, 0) rotate(145deg) scale(1); }
      100% { transform: translate3d(calc(var(--drift, 22px) * -.5), -115vh, 0) rotate(310deg) scale(.8); opacity: 0; }
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding: max(34px, env(safe-area-inset-top)) 18px max(36px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile {
      opacity: 0;
      transform: translateY(12px);
      animation: reveal .7s cubic-bezier(.2,.75,.25,1) .1s forwards;
      text-align: center;
    }

    @keyframes reveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar-wrap {
      position: relative;
      width: 122px;
      height: 122px;
      margin: 2px auto 16px;
      border-radius: 50%;
      padding: 4px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 16px 45px rgba(135, 0, 116, .25), 0 0 0 1px rgba(255,255,255,.65);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: linear-gradient(145deg, #ffd3f4, #e54eda);
    }

    .online {
      position: absolute;
      right: 3px;
      bottom: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #42df83;
      border: 3px solid white;
      box-shadow: 0 4px 12px rgba(0,0,0,.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 9vw, 46px);
      line-height: 1;
      letter-spacing: -.04em;
      text-shadow: 0 5px 22px rgba(110, 0, 90, .25);
    }

    .bio {
      margin: 13px 0 26px;
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,.92);
      text-shadow: 0 2px 12px rgba(125,0,105,.22);
    }

    .content {
      width: 100%;
      display: grid;
      gap: 20px;
    }

    .photo-card {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 1.63 / 1;
      overflow: hidden;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.72);
      background: linear-gradient(140deg, rgba(255,255,255,.35), rgba(155,7,135,.28));
      box-shadow: 0 22px 60px rgba(116,0,103,.31), inset 0 1px 0 rgba(255,255,255,.65);
      opacity: 0;
      transform: translateY(18px) scale(.98);
      animation: reveal-card .75s cubic-bezier(.2,.8,.2,1) .28s forwards;
      isolation: isolate;
    }

    @keyframes reveal-card {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background: linear-gradient(180deg, transparent 40%, rgba(35,0,30,.56) 100%);
      pointer-events: none;
    }

    .photo-card::after {
      content: "";
      position: absolute;
      z-index: 3;
      top: -100%;
      left: -35%;
      width: 38%;
      height: 260%;
      transform: rotate(22deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.47), transparent);
      animation: shimmer 4.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%, 62% { left: -50%; }
      100% { left: 125%; }
    }

    .main-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .6s cubic-bezier(.2,.75,.25,1);
    }

    .photo-card:active .main-photo { transform: scale(1.025); }

    .photo-label {
      position: absolute;
      z-index: 4;
      left: 0;
      right: 0;
      bottom: 20px;
      text-align: center;
      font-size: clamp(25px, 7vw, 34px);
      font-weight: 750;
      letter-spacing: -.03em;
      color: white;
      text-shadow: 0 3px 18px rgba(0,0,0,.56);
    }

    .telegram {
      position: relative;
      min-height: 82px;
      padding: 14px 25px 14px 18px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--ink);
      text-decoration: none;
      font-size: 22px;
      font-weight: 760;
      letter-spacing: -.02em;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,.88);
      box-shadow: 0 14px 38px rgba(122,0,105,.2), inset 0 1px 0 white;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      opacity: 0;
      transform: translateY(16px);
      animation: reveal .65s ease .52s forwards, pulse 2.25s ease-in-out 1.3s infinite;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 14px 38px rgba(122,0,105,.2), 0 0 0 0 rgba(255,255,255,.5), inset 0 1px 0 white; }
      50% { box-shadow: 0 17px 45px rgba(122,0,105,.28), 0 0 0 9px rgba(255,255,255,0), inset 0 1px 0 white; }
    }

    .tg-icon {
      flex: 0 0 54px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(145deg, #ff84d5, #d926ba);
      box-shadow: 0 8px 20px rgba(194,15,158,.28);
    }

    .tg-icon svg { width: 27px; height: 27px; fill: currentColor; }
    .telegram:active { transform: scale(.985); }

    .browser-guide {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: max(72px, env(safe-area-inset-top)) 22px 30px;
      background:
        radial-gradient(circle at 80% 8%, rgba(255,255,255,.24), transparent 25%),
        linear-gradient(180deg, #f58eea, #df2fe7);
    }

    .browser-guide.show { display: flex; }

    .guide-arrow {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      right: 23px;
      font-size: 66px;
      line-height: 1;
      transform: rotate(-20deg);
      animation: point 1.2s ease-in-out infinite;
    }

    @keyframes point {
      50% { transform: translateY(-8px) rotate(-20deg); }
    }

    .guide-card {
      width: min(100%, 430px);
      padding: 30px 25px;
      border: 1px solid rgba(255,255,255,.75);
      border-radius: 30px;
      text-align: center;
      background: rgba(255,255,255,.2);
      box-shadow: 0 28px 80px rgba(99,0,89,.25);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .guide-card h2 {
      margin: 0 0 12px;
      font-size: 38px;
      letter-spacing: -.04em;
    }

    .guide-card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.55;
      color: rgba(255,255,255,.92);
    }

    .guide-card strong { color: white; }

    @media (min-width: 700px) {
      .page { padding-top: 50px; }
      .avatar-wrap { width: 136px; height: 136px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="flowers" aria-hidden="true">
    <span class="flower" style="--x:7vw;--size:22px;--time:12s;--delay:-2s;--drift:24px">🌸</span>
    <span class="flower" style="--x:22vw;--size:29px;--time:14s;--delay:-9s;--drift:-34px">🌸</span>
    <span class="flower" style="--x:42vw;--size:19px;--time:10s;--delay:-6s;--drift:42px">🌸</span>
    <span class="flower" style="--x:63vw;--size:26px;--time:13s;--delay:-4s;--drift:-28px">🌸</span>
    <span class="flower" style="--x:84vw;--size:34px;--time:15s;--delay:-11s;--drift:38px">🌸</span>
    <span class="flower" style="--x:95vw;--size:21px;--time:11s;--delay:-7s;--drift:-32px">🌸</span>
  </div>

  <main class="page">
    <header class="profile">
      <div class="avatar-wrap">
        <img class="avatar" src="avatar.jpg" alt="Becky profile photo">
        <span class="online" aria-label="Online"></span>
      </div>
      <h1>Becky</h1>
      <p class="bio">hiii, I’m Becky ☆ let’s chat ↓</p>
    </header>

    <section class="content" aria-label="Becky links">
      <a class="photo-card"
   href="https://www.fanvue.com/beckyhere/fv-1"
   target="_blank"
   rel="noopener noreferrer"
   aria-label="Fanvue">

  <img class="main-photo" src="main-photo.jpg" alt="Becky">

  <span class="photo-label">Text me here 🤍</span>

</a>

      <a class="telegram" href="https://t.me/+b1YIhD1YyJk0ZTFh" target="_blank" rel="noopener noreferrer">
        <span class="tg-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M21.8 3.2 18.6 19c-.2 1.1-.9 1.4-1.8.9l-4.9-3.6-2.4 2.3c-.3.3-.5.5-1 .5l.4-5 9.1-8.2c.4-.4-.1-.6-.6-.2L6.1 12.8l-4.8-1.5c-1.1-.3-1.1-1.1.2-1.6L20.3 2.5c.9-.3 1.7.2 1.5.7Z"/></svg>
        </span>
        <span>Telegram</span>
      </a>
    </section>
  </main>

  <aside class="browser-guide" id="browserGuide" aria-label="Open in browser instructions">
    <div class="guide-arrow" aria-hidden="true">↗</div>
    <div class="guide-card">
      <h2>Open in Browser</h2>
      <p>Tap the <strong>•••</strong> menu in the top-right corner, then choose <strong>Open in external browser</strong>.</p>
    </div>
  </aside>

  <script>
    (() => {
      const ua = navigator.userAgent || "";
      const isInstagram = /Instagram/i.test(ua);
      if (isInstagram) {
        document.getElementById("browserGuide").classList.add("show");
      }
    })();
  </script>
</body>
</html>
