<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Becky</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  overflow:hidden;
  background:linear-gradient(135deg,#ff7ad3 0%,#3b0b24 42%,#000 100%);
  font-family:"Outfit",-apple-system,BlinkMacSystemFont,Arial,sans-serif;
}

.page{
  display:none;
  min-height:100vh;
  align-items:center;
  justify-content:center;
  padding:24px;
  padding-top:calc(24px + env(safe-area-inset-top));
  padding-bottom:calc(24px + env(safe-area-inset-bottom));
}

.show{display:flex}

.wrap{
  width:100%;
  max-width:420px;
  text-align:center;
  color:#fff;
}

.avatar{
  width:150px;
  height:150px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid rgba(255,255,255,.92);
  box-shadow:0 18px 45px rgba(0,0,0,.42),0 0 35px rgba(255,100,210,.35);
  margin-bottom:24px;
  background:rgba(255,255,255,.18);
}

.main-title{
  font-family:"Pacifico",cursive;
  font-size:46px;
  line-height:1.15;
  font-weight:400;
  margin-bottom:32px;
  text-shadow:0 4px 18px rgba(0,0,0,.32);
}

.btn{
  display:block;
  width:100%;
  margin:17px auto;
  padding:20px 22px;
  border-radius:26px;
  text-decoration:none;
  color:#fff;
  font-size:27px;
  font-weight:900;
  letter-spacing:.2px;
  background:linear-gradient(180deg,#ff91de 0%,#ff48b4 52%,#e72b9c 100%);
  box-shadow:
    0 12px 28px rgba(255,55,170,.45),
    inset 0 3px 3px rgba(255,255,255,.45),
    inset 0 -4px 9px rgba(125,0,70,.25);
  transition:.15s ease;
}

.btn:active{transform:scale(.97)}

.ig-title{
  font-size:46px;
  line-height:1;
  font-weight:900;
  margin-bottom:22px;
  text-shadow:0 4px 18px rgba(0,0,0,.38);
}

.ig-text{
  font-size:26px;
  line-height:1.25;
  font-weight:800;
}

.ig-small{
  font-size:19px;
  line-height:1.35;
  opacity:.9;
  margin-top:16px;
  font-weight:700;
}

.down{
  font-size:48px;
  margin:14px 0;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.35));
}

.corner-arrow{
  position:fixed;
  top:calc(12px + env(safe-area-inset-top));
  right:34px;
  width:98px;
  height:98px;
  pointer-events:none;
  z-index:50;
  animation:arrowMove 1.05s ease-in-out infinite;
  filter:drop-shadow(0 5px 9px rgba(0,0,0,.55));
}

.corner-arrow svg{
  width:100%;
  height:100%;
  transform:rotate(-18deg);
}

@keyframes arrowMove{
  0%,100%{transform:translate(-5px,10px) scale(1)}
  50%{transform:translate(7px,-2px) scale(1.08)}
}

@media(max-height:700px){
  .avatar{width:120px;height:120px;margin-bottom:16px}
  .ig-title{font-size:38px;margin-bottom:16px}
  .ig-text{font-size:23px}
  .main-title{font-size:40px;margin-bottom:24px}
  .btn{font-size:24px;padding:17px}
}
</style>
</head>

<body>

<section id="igPage" class="page">
  <div class="corner-arrow">
    <svg viewBox="0 0 120 120" aria-hidden="true">
      <path d="M20 92 C42 58, 62 36, 96 20" fill="none" stroke="white" stroke-width="13" stroke-linecap="round"/>
      <path d="M74 18 L100 18 L101 44" fill="none" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <div class="wrap">
    <img class="avatar" src="becky.jpg" alt="">
    <div class="ig-title">Open in<br>Browser</div>

    <div class="ig-text">
      Tap <b>•••</b><br>
      in the top right
    </div>

    <div class="down">↓</div>

    <div class="ig-text">
      Choose<br>
      <b>Open in Browser</b>
    </div>

    <div class="ig-small">
      Then my links will open normally.
    </div>
  </div>
</section>

<section id="mainPage" class="page">
  <div class="wrap">
    <img class="avatar" src="./becky.jpg?v=2" alt="Becky">
    <div class="main-title">Find me here ↓</div>

    <a class="btn" href="https://www.fanvue.com/beckyhere">I'm on FanVue 💋</a>
    <a class="btn" href="https://dfans.co/beckyhere">I'm on dFans 🔥 </a>
    <a class="btn" href="https://t.me/+b1YIhD1YyJk0ZTFh">I'm on Telegram ❤️</a>
    <a class="btn" href="https://www.stacked.com/@beckyhere">I'm on Staked 🍓 </a>
  </div>
</section>

<script>
const ua = navigator.userAgent || "";
const isInstagram = /Instagram/i.test(ua);
document.getElementById(isInstagram ? "igPage" : "mainPage").classList.add("show");
</script>

</body>
</html>
